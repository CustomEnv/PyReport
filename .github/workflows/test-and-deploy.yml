name: Tests + Demo Report

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: |
          pip install ruff
          ruff check src/pyreport/ tests/ scripts/

      - name: Run tests with PyReport
        run: |
          RUN_ID=${{ github.run_id }}
          pytest tests/ \
            --pyreport \
            --pyreport-output "reports/${RUN_ID}/test-report" \
            --tb=short

      - name: Generate demo report
        run: |
          RUN_ID=${{ github.run_id }}
          python scripts/generate_demo.py \
            --output "reports/${RUN_ID}/demo"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
