name: Tests + Demo Report

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check src/pyreport/ tests/ scripts/

      - name: Run tests with PyReport
        run: |
          RUN_ID=${{ github.run_id }}
          uv run pytest tests/ \
            --pyreport \
            --pyreport-output "reports/${RUN_ID}/test-report" \
            --tb=short

      - name: Generate demo report
        run: |
          RUN_ID=${{ github.run_id }}
          uv run python scripts/generate_demo.py \
            --output "reports/${RUN_ID}/demo"

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/reports/${{ github.run_id }}
          cp -r reports/${{ github.run_id }}/* _site/reports/${{ github.run_id }}/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment PR with report links
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.runId;
            const repo = context.repo;
            const pagesUrl = `https://${repo.owner}.github.io/${repo.repo}`;

            const body = `## PyReport
            - [Demo report](${pagesUrl}/reports/${runId}/demo/)
            - [Test report](${pagesUrl}/reports/${runId}/test-report/)`;

            // Delete previous bot comments to keep it clean
            const { data: comments } = await github.rest.issues.listComments({
              ...repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments) {
              if (comment.body?.startsWith('## PyReport')) {
                await github.rest.issues.deleteComment({
                  ...repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              ...repo,
              issue_number: context.issue.number,
              body,
            });
