name: Tests + Demo Report

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check src/pyreport/ tests/ scripts/

      - name: Checkout gh-pages (for history)
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: _gh-pages

      - name: Restore test history
        run: |
          mkdir -p "_site/reports/${{ github.run_id }}/test-report"
          if [ -d _gh-pages/.pyreport_history ]; then
            cp -r _gh-pages/.pyreport_history "_site/reports/${{ github.run_id }}/test-report/.pyreport_history"
          fi

      - name: Run tests with PyReport
        run: |
          uv run pytest tests/ \
            --pyreport \
            --pyreport-output "_site/reports/${{ github.run_id }}/test-report" \
            --tb=short

      - name: Generate history page for test report
        continue-on-error: true
        run: |
          uv run python -m pyreport history \
            "_site/reports/${{ github.run_id }}/test-report" \
            -o "_site/reports/${{ github.run_id }}/test-report"

      - name: Restore demo history
        run: |
          mkdir -p "_site/reports/${{ github.run_id }}/demo"
          if [ -d _gh-pages/.pyreport_history ]; then
            cp -r _gh-pages/.pyreport_history "_site/reports/${{ github.run_id }}/demo/.pyreport_history"
          fi

      - name: Generate demo report
        run: |
          uv run python scripts/generate_demo.py \
            --output "_site/reports/${{ github.run_id }}/demo"

      - name: Save run metadata
        run: |
          printf '{"pr":%s,"run":%s,"repo":"%s","ts":"%s"}\n' \
            "${{ github.event.pull_request.number }}" \
            "${{ github.run_id }}" \
            "${{ github.repository }}" \
            "$(date -u +%Y-%m-%dT%H:%M:%S)" \
            > "_site/reports/${{ github.run_id }}/.meta.json"

      - name: Merge reports and generate index
        run: |
          mkdir -p _gh-pages
          uv run pyreport deploy _site _gh-pages

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

      - name: Comment PR with report links
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.runId;
            const repo = context.repo;
            const pagesUrl = `https://${repo.owner}.github.io/${repo.repo}`;

            const body = `## PyReport
            - [All runs](${pagesUrl}/)
            - [Demo report](${pagesUrl}/reports/${runId}/demo/)
            - [Test report](${pagesUrl}/reports/${runId}/test-report/)`;

            const { data: comments } = await github.rest.issues.listComments({
              ...repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments) {
              if (comment.user?.type === 'Bot' && comment.body?.startsWith('## PyReport')) {
                await github.rest.issues.deleteComment({
                  ...repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              ...repo,
              issue_number: context.issue.number,
              body,
            });
